name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version info
        id: info
        run: |
          DATE=$(date +'%Y.%m.%d')
          RUN_NUM=${{ github.run_number }}
          APP_NAME="ZipMaster"
          echo "TAG=v${DATE}-build${RUN_NUM}" >> $GITHUB_OUTPUT
          echo "APK_NAME=${APP_NAME}-${DATE}-build${RUN_NUM}.apk" >> $GITHUB_OUTPUT

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "app/build/outputs/apk/debug/${{ steps.info.outputs.APK_NAME }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.TAG }}
          name: "${{ steps.info.outputs.TAG }}"
          body: |
            **Build:** `${{ steps.info.outputs.TAG }}`
            **Commit:** `${{ github.sha }}`
          files: app/build/outputs/apk/debug/${{ steps.info.outputs.APK_NAME }}
          make_latest: true
